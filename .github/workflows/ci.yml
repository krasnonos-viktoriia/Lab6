name: CI Pipeline 
 
on: 
  pull_request: 
    types: [opened, edited, reopened, synchronize, review_requested, submitted] 
    branches: 
      - develop 
 
jobs: 
  test: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v3 
 
      - name: Setup Node.js 
        uses: actions/setup-node@v3 
        with: 
          node-version: '18' 
          cache: 'npm' 
 
      - name: Install dependencies 
        run: | 
          if [ -f package.json ]; then 
            npm ci 
          else 
            echo "No package.json found, skipping dependency installation." 
          fi 
 
      - name: Lint JavaScript 
        run: | 
          if [ -f package.json ] && ( [ -f .eslintrc ] || grep -q '"eslint"' package.json ); then 
            npx eslint . --ext .js --max-warnings 0 
          else 
            echo "ESLint not configured, skipping JS linting." 
          fi 
 
      - name: Lint CSS 
        run: | 
          if [ -f package.json ] && ( [ -f .stylelintrc ] || grep -q '"stylelint"' package.json ); then 
            npx stylelint "**/*.css" 
          else 
            echo "Stylelint not configured, skipping CSS linting." 
          fi 
 
      - name: Run tests 
        run: | 
          if [ -f package.json ] && grep -q '"test"' package.json; then 
            npm test 
          else 
            echo "No test script found, skipping tests." 
          fi 
 
  review-check: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Check for approved code review 
        uses: actions/github-script@v6 
        with: 
          script: | 
            const prNumber = context.payload.pull_request.number; 
            const { data: reviews } = await github.pulls.listReviews({ 
              owner: context.repo.owner, 
              repo: context.repo.repo, 
              pull_number: prNumber 
            }); 
 
            const approved = reviews.some(review => review.state === 'APPROVED'); 
 
            if (!approved) { 
              core.setFailed("Код-рев’ю не схвалено. Потрібен хоча б один APPROVED."); 
            } 
 
  analysis: 
    runs-on: ubuntu-latest 
    needs: [test, review-check] 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v3 
        with: 
          fetch-depth: 0 
 
      - name: Setup Node.js 
        uses: actions/setup-node@v3 
        with: 
          node-version: '18' 
 
      - name: Install dependencies 
        run: | 
          if [ -f package.json ]; then 
            npm ci 
          fi 
 
      - name: Run ESLint with Reviewdog 
        uses: reviewdog/action-eslint@v1 
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          reporter: github-pr-review 
          eslint_flags: ". --ext .js" 
          level: error 
 
      - name: Run Prettier with Reviewdog 
        uses: EPMatt/reviewdog-action-prettier@v1 
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          reporter: github-pr-review 
          level: info 
         
      - name: Install cloc 
        run: sudo apt-get update && sudo apt-get install -y cloc 
 
      - name: Count lines of code 
        run: | 
          if [ -d src ]; then 
            cloc src/ > cloc-report.txt 
            cat cloc-report.txt 
          else 
            echo "No src directory found, skipping cloc." 
          fi 
 
      - name: Run SonarQube analysis 
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        run: | 
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip 
          unzip -o sonar-scanner-cli-4.8.0.2856-linux.zip 
          export PATH=$PATH:$(pwd)/sonar-scanner-4.8.0.2856-linux/bin 
 
          sonar-scanner \ 
            -Dsonar.login=$SONAR_TOKEN