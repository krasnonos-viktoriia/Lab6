name: CI Pipeline 
 
on: 
  push:
    branches:
      - master
      - develop
  pull_request: 
    types: [opened, edited, reopened, synchronize, review_requested, submitted] 
    branches: 
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping dependency installation."
          fi

      - name: Lint JavaScript
        run: |
          if [ -f package.json ] && ( [ -f .eslintrc ] || grep -q '"eslint"' package.json ); then
            npx eslint . --ext .js --max-warnings 0
          else
            echo "ESLint not configured, skipping JS linting."
          fi

      - name: Run tests with coverage
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            # Убедись, что этот скрипт генерирует lcov.info в папке coverage
            npm run test:coverage || echo "Tests failed but continuing for analysis"
          else
            echo "No test script found, skipping tests."
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  review-check:
    runs-on: ubuntu-latest
    # Запускаем проверку ревью ТОЛЬКО если это Pull Request
    if: github.event_name == 'pull_request'
    steps:
      - name: Check for approved code review
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`Found ${reviews.length} reviews`);
            reviews.forEach(r => console.log(`- Author: ${r.user.login}, State: ${r.state}`));

            const approved = reviews.some(review => review.state === 'APPROVED');

            if (!approved) {
              core.setFailed("Code review not approved. At least one APPROVED is required.");
            } else {
              console.log("Approval check passed!");
            }

  analysis:
    runs-on: ubuntu-latest
    # Если это push, то review-check пропустится, и analysis начнется сразу после test
    needs: [test]
    # Если это PR, то ждем еще и review-check
    if: always() && (needs.test.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc

      - name: Count lines of code
        run: |
          cloc . --exclude-dir=node_modules --outfile=cloc-report.txt
          cat cloc-report.txt

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=krasnonos-viktoriia_Lab6
            -Dsonar.organization=krasnonos-viktoriia
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,tests/**
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info