name: CI Pipeline 
 
on: 
  pull_request: 
    types: [opened, edited, reopened, synchronize, review_requested, submitted] 
    branches: 
      - develop
      - master 
 
jobs: 
  test: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v3 
 
      - name: Setup Node.js 
        uses: actions/setup-node@v3 
        with: 
          node-version: '22' 
          cache: 'npm' 
 
      - name: Install dependencies 
        run: | 
          if [ -f package.json ]; then 
            npm ci 
          else 
            echo "No package.json found, skipping dependency installation." 
          fi 
 
      - name: Lint JavaScript 
        run: | 
          if [ -f package.json ] && ( [ -f .eslintrc ] || grep -q '"eslint"' package.json ); then 
            npx eslint . --ext .js --max-warnings 0 
          else 
            echo "ESLint not configured, skipping JS linting." 
          fi 
 
      - name: Lint CSS 
        run: | 
          if [ -f package.json ] && ( [ -f .stylelintrc ] || grep -q '"stylelint"' package.json ); then 
            npx stylelint "**/*.css" 
          else 
            echo "Stylelint not configured, skipping CSS linting." 
          fi 
 
      - name: Run tests 
        run: | 
          if [ -f package.json ] && grep -q '"test"' package.json; then 
            npm test 
          else 
            echo "No test script found, skipping tests." 
          fi 
 
  review-check: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Check for approved code review 
        uses: actions/github-script@v6 
        with: 
          script: | 
            const prNumber = context.payload.pull_request.number; 
            // Добавляем .rest перед .pulls
            const { data: reviews } = await github.rest.pulls.listReviews({ 
              owner: context.repo.owner, 
              repo: context.repo.repo, 
              pull_number: prNumber 
            }); 

            console.log(`Знайдено ревью: ${reviews.length}`);
            reviews.forEach(r => console.log(`- Автор: ${r.user.login}, Статус: ${r.state}`));

            const approved = reviews.some(review => review.state === 'APPROVED'); 
 
            if (!approved) { 
              core.setFailed("Код-рев’ю не схвалено. Потрібен хоча б один APPROVED."); 
            } else {
              console.log("Перевірка пройдена: APPROVED!");
            }
 
  analysis: 
    runs-on: ubuntu-latest 
    needs: [test, review-check] 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v3 
        with: 
          fetch-depth: 0 
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
 
      - name: Install dependencies 
        run: | 
          if [ -f package.json ]; then 
            npm install 
          fi 

      - name: Add node_modules to PATH
        run: echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH
 
      - name: Run ESLint with Reviewdog 
        uses: reviewdog/action-eslint@v1 
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          reporter: github-pr-review 
          eslint_flags: ". --ext .js" 
          level: warning
 
      - name: Run Prettier with Reviewdog 
        uses: EPMatt/reviewdog-action-prettier@v1 
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          reporter: github-pr-review 
          level: info 
         
      - name: Install cloc 
        run: sudo apt-get update && sudo apt-get install -y cloc 
 
      - name: Count lines of code 
        run: | 
          if [ -d src ]; then 
            cloc src/ > cloc-report.txt 
            cat cloc-report.txt 
          else 
            echo "No src directory found, skipping cloc." 
          fi 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run SonarQube analysis 
        continue-on-error: true
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        run: | 
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip 
          unzip -o sonar-scanner-cli-5.0.1.3006-linux.zip 
          
          export PATH=$(pwd)/sonar-scanner-5.0.1.3006-linux/bin:$PATH
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          sonar-scanner \ 
            -Dsonar.login=$SONAR_TOKEN