name: CI Pipeline

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, review_requested, submitted]
    branches:
      - develop

jobs:
  # Job для перевірки якості коду (лінтинг, тести)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping dependency installation."
          fi

      - name: Lint JavaScript
        run: |
          if [ -f .eslintrc* ] || grep -q '"eslint"' package.json 2>/dev/null; then
            npx eslint . --ext .js --max-warnings 0
          else
            echo "ESLint not configured, skipping JS linting."
          fi

      - name: Lint CSS
        run: |
          if [ -f .stylelintrc* ] || grep -q '"stylelint"' package.json 2>/dev/null; then
            npx stylelint "**/*.css"
          else
            echo "Stylelint not configured, skipping CSS linting."
          fi

      - name: Run tests
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "No test script found, skipping tests."
          fi

  # Job для перевірки наявності схваленого код-рев’ю
  review-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for approved code review
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const approved = reviews.some(review => review.state === 'APPROVED');
            if (!approved) {
              core.setFailed("Код-рев’ю не схвалено. Злиття у гілку develop можливе лише після отримання схвалення.");
            }

  # Job для статичного аналізу (SonarQube) та збору метрик
  analysis:
    runs-on: ubuntu-latest
    needs: [test, review-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Підрахунок рядків коду за допомогою cloc
      - name: Count lines of code with Cloc
        run: |
          sudo apt-get install -y cloc
          cloc src/ > cloc-report.txt
          cat cloc-report.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=your_project_key
            -Dsonar.organization=your_organization