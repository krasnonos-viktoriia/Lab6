name: CI Pipeline 
 
on: 
  push:
    branches:
      - master
      - develop
  pull_request: 
    types: [opened, edited, reopened, synchronize, review_requested, submitted] 
    branches: 
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping dependency installation."
          fi

      - name: Lint JavaScript
        run: |
          if [ -f package.json ] && ( [ -f .eslintrc ] || grep -q '"eslint"' package.json ); then
            npx eslint . --ext .js --max-warnings 0
          else
            echo "ESLint not configured, skipping JS linting."
          fi

      - name: Lint CSS
        run: |
          if [ -f package.json ] && ( [ -f .stylelintrc ] || grep -q '"stylelint"' package.json ); then
            npx stylelint "**/*.css"
          else
            echo "Stylelint not configured, skipping CSS linting."
          fi

      - name: Run tests with coverage
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm run test:coverage
          else
            echo "No test script found, skipping tests."
          fi

      - name: Print coverage %
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const data = require('./coverage/coverage-summary.json');
              console.log('Coverage:', data.total.lines.pct + '%');
            "
          else
            echo "Coverage report not found"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  review-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for approved code review
        uses: actions/github-script@v6
        with:
          script: |
            // Проверяем, запущен ли пайплайн из Pull Request
            const pr = context.payload.pull_request;
            
            if (!pr) {
              console.log("Это не Pull Request (возможно, прямой push). Пропуск проверки ревью.");
              return; 
            }

            const prNumber = pr.number;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`Found ${reviews.length} reviews`);
            reviews.forEach(r => console.log(`- Author: ${r.user.login}, State: ${r.state}`));

            const approved = reviews.some(review => review.state === 'APPROVED');

            if (!approved) {
              core.setFailed("Code review not approved. At least one APPROVED is required.");
            } else {
              console.log("Approval check passed!");
            }

  analysis:
    runs-on: ubuntu-latest
    needs: [test, review-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Add node_modules to PATH
        run: echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Verify lcov.info exists and show content
        run: |
          echo "=== Проверка coverage/ ==="
          ls -la coverage/ || echo
          echo "=== Первые 20 строк lcov.info ==="
          if [ -f coverage/lcov.info ]; then
            head -n 20 coverage/lcov.info
          else
            echo
            exit 1
          fi

      - name: Run ESLint with Reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: ". --ext .js"
          level: warning

      - name: Run Prettier with Reviewdog
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: info

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc

      - name: Count lines of code (text)
        run: |
          if [ -d src ]; then
            cloc src/ > cloc-report.txt
            cat cloc-report.txt
          else
            echo "No src directory found, skipping cloc."
          fi

      - name: Save cloc JSON report
        run: |
          if [ -d src ]; then
            mkdir -p cloc
            cloc src --json --out=cloc/report.json
          fi

      - name: Upload cloc reports
        uses: actions/upload-artifact@v4
        with:
          name: cloc-reports
          path: |
            cloc-report.txt
            cloc/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=krasnonos-viktoriia_Lab6
            -Dsonar.organization=krasnonos-viktoriia
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'